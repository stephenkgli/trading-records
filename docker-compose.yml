services:
  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: trading_records
      POSTGRES_USER: ${DB_USER:-trading}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trading}
    # No host port exposure — only accessible via Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trading} -d trading_records"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-trading}:${DB_PASSWORD:-trading}@db:5432/trading_records
      IBKR_FLEX_TOKEN: ${IBKR_FLEX_TOKEN:-}
      IBKR_QUERY_ID: ${IBKR_QUERY_ID:-}
      TRADOVATE_USERNAME: ${TRADOVATE_USERNAME:-}
      TRADOVATE_PASSWORD: ${TRADOVATE_PASSWORD:-}
      TRADOVATE_CLIENT_ID: ${TRADOVATE_CLIENT_ID:-}
      TRADOVATE_CLIENT_SECRET: ${TRADOVATE_CLIENT_SECRET:-}
      TRADOVATE_DEVICE_ID: ${TRADOVATE_DEVICE_ID:-}
      API_KEY: ${API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
